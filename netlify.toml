# Netlify config when the site base directory is `client`.
# (Also keep the root netlify.toml for monorepo deploys.)

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/menu"
  to = "/.netlify/functions/menu"
  status = 200

[[redirects]]
  from = "/scanmenu"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/scanmenu/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
