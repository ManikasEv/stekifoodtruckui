    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["FoodEstablishment", "LocalBusiness"],
        "@id": "https://steki.ch/#foodtruck",
        "name": "STEKI Greek Taste",
        "legalName": "STEKI GmbH",
        "description": "Mobiler griechischer Foodtruck mit authentischem Streetfood, Souvlaki, Bifteki und Pita.",
        "url": "https://steki.ch/",
        "email": "info@steki.ch",
        "logo": "https://steki.ch/logo.jpeg",
        "image": "https://steki.ch/logo.jpeg",
        "servesCuisine": ["Griechisch", "Streetfood"],
        "priceRange": "CHF 3–24",
        "currenciesAccepted": "CHF",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Bahnhofstrasse 107",
          "postalCode": "5430",
          "addressLocality": "Wettingen",
          "addressRegion": "AG",
          "addressCountry": "CH"
        },
        "areaServed": {
          "@type": "AdministrativeArea",
          "name": "Wettingen und Umgebung"
        },
        "hasMenu": "https://steki.ch/#speisekarte"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Static duplicate of the booking form so Netlify's build bots detect it -->
    <form name="foodtruck-buchung" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="telefon" />
      <input type="date" name="datum" />
      <input type="text" name="ort" />
      <textarea name="nachricht"></textarea>
      <input name="bot-field" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
